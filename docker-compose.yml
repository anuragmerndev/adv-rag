services:
  db:
    image: postgres:16
    ports:
      - 5432:5432
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=my_pass
      - POSTGRES_USER=postgres
      - POSTGRES_DB=adv-rag

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  db:
  redis_data: